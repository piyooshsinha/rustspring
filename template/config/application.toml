# Defaults for every profile. Profile overrides go in
# application-{profile}.toml, selected with APP_PROFILE (default: dev).

[server]
host = "127.0.0.1"
port = 8080

# SQLite by default — the file is created on first run, no server needed.
# For Postgres/MySQL, change the rustspring feature in Cargo.toml and set:
#   url = "postgres://postgres:postgres@localhost:5432/postgres"
[database]
url = "sqlite://data.db?mode=rwc"
max_connections = 5

# Uncomment to serve a built SPA (e.g. React) with index.html fallback:
# [static]
# dir = "frontend/dist"
